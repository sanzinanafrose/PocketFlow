{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container">
  <div class="auth-card card">
    <div class="card-header">
      <i class="bi bi-wallet2 display-6 d-block mb-2"></i>
      <h4 class="mb-0 fw-bold">Sign in to PocketFlow</h4>
      <p class="mb-0 opacity-75 small">Track every penny, effortlessly.</p>
    </div>
    <div class="card-body p-4">
      <form method="POST" action="{{ url_for('login') }}" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="username" name="username" class="form-control"
                   placeholder="Your username" required autofocus
                   value="{{ request.form.get('username', '') }}">
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Your password" required>
          </div>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" value="on" id="remember" name="remember">
          <label class="form-check-label" for="remember">Remember me (keep logged in for 30 days)</label>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </div>
      </form>
    </div>
    <div class="card-footer text-center text-muted py-3">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="fw-semibold text-decoration-none">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
