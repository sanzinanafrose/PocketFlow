{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="container">
  <div class="auth-card card" style="max-width:500px">
    <div class="card-header">
      <i class="bi bi-person-plus display-6 d-block mb-2"></i>
      <h4 class="mb-0 fw-bold">Create Your Account</h4>
      <p class="mb-0 opacity-75 small">Start tracking your expenses today.</p>
    </div>
    <div class="card-body p-4">
      <form method="POST" action="{{ url_for('register') }}" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="username" name="username" class="form-control"
                   placeholder="Choose a username (min 3 chars)" required autofocus
                   value="{{ request.form.get('username', '') }}">
          </div>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" name="email" class="form-control"
                   placeholder="your@email.com" required
                   value="{{ request.form.get('email', '') }}">
          </div>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Min 6 characters" required>
          </div>
        </div>
        <div class="mb-4">
          <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                   placeholder="Repeat your password" required>
          </div>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg fw-semibold">
            <i class="bi bi-person-check me-2"></i>Create Account
          </button>
        </div>
      </form>
    </div>
    <div class="card-footer text-center text-muted py-3">
      Already have an account?
      <a href="{{ url_for('login') }}" class="fw-semibold text-decoration-none">Sign in here</a>
    </div>
  </div>
</div>
{% endblock %}
