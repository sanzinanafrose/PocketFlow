{% extends 'base.html' %}
{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="container" style="max-width:680px">
  <div class="page-header">
    <h2><i class="bi bi-plus-circle me-2 text-primary"></i>Add New Expense</h2>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form method="POST" action="{{ url_for('add_expense') }}" novalidate>

        <!-- Title -->
        <div class="mb-3">
          <label for="title" class="form-label fw-semibold">
            <i class="bi bi-card-text me-1 text-primary"></i>Title <span class="text-danger">*</span>
          </label>
          <input type="text" id="title" name="title" class="form-control"
                 placeholder="e.g. Lunch at café, Monthly rent"
                 value="{{ form.get('title', '') if form else '' }}" required>
        </div>

        <!-- Amount + Date -->
        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label for="amount" class="form-label fw-semibold">
              <i class="bi bi-currency-dollar me-1 text-success"></i>Amount <span class="text-danger">*</span>
            </label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" id="amount" name="amount" class="form-control"
                     step="0.01" min="0.01" placeholder="0.00"
                     value="{{ form.get('amount', '') if form else '' }}" required>
            </div>
          </div>
          <div class="col-sm-6">
            <label for="date" class="form-label fw-semibold">
              <i class="bi bi-calendar3 me-1 text-warning"></i>Date <span class="text-danger">*</span>
            </label>
            <input type="date" id="date" name="date" class="form-control"
                   value="{{ form.get('date', today) if form else today }}" required>
          </div>
        </div>

        <!-- Category -->
        <div class="mb-3">
          <label for="category" class="form-label fw-semibold">
            <i class="bi bi-tag me-1 text-info"></i>Category <span class="text-danger">*</span>
          </label>
          <select id="category" name="category" class="form-select" required>
            <option value="">— Select a category —</option>
            {% for cat in categories %}
              <option value="{{ cat }}"
                {{ 'selected' if (form and form.get('category') == cat) }}>
                {{ cat }}
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- Notes -->
        <div class="mb-3">
          <label for="notes" class="form-label fw-semibold">
            <i class="bi bi-chat-left-text me-1 text-secondary"></i>Notes
            <span class="text-muted fw-normal">(optional)</span>
          </label>
          <textarea id="notes" name="notes" class="form-control" rows="2"
                    placeholder="Any extra details about this expense…">{{ form.get('notes', '') if form else '' }}</textarea>
        </div>

        <!-- Tags -->
        <div class="mb-4">
          <label for="tags" class="form-label fw-semibold">
            <i class="bi bi-tags me-1 text-secondary"></i>Tags
            <span class="text-muted fw-normal">(optional)</span>
          </label>
          <input type="text" id="tags" name="tags" class="form-control"
                 placeholder="e.g. work, personal, reimbursable  (comma-separated)"
                 value="{{ form.get('tags', '') if form else '' }}">
          <div class="form-text">Separate multiple tags with commas.</div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>Save Expense
          </button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>

      </form>
    </div>
  </div>
</div>
{% endblock %}
