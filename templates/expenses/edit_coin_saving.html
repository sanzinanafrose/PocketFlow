{% extends 'base.html' %}
{% block title %}Edit Coin Bank Entry{% endblock %}

{% block content %}
<div class="container" style="max-width:620px">
  <div class="page-header">
    <h2><i class="bi bi-pencil-square me-2 text-danger"></i>Edit Coin Bank Entry</h2>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form method="POST" action="{{ url_for('edit_coin_saving', saving_id=saving.id) }}" novalidate>
        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label for="amount" class="form-label fw-semibold">
              <i class="bi bi-currency-dollar me-1 text-success"></i>Amount <span class="text-danger">*</span>
            </label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" id="amount" name="amount" class="form-control"
                     step="0.01" min="0.01"
                     value="{{ request.form.get('amount', saving.amount) }}" required>
            </div>
          </div>
          <div class="col-sm-6">
            <label for="date" class="form-label fw-semibold">
              <i class="bi bi-calendar3 me-1 text-warning"></i>Date <span class="text-danger">*</span>
            </label>
            <input type="date" id="date" name="date" class="form-control"
                   value="{{ request.form.get('date', saving.date) }}" required>
          </div>
        </div>

        <div class="mb-4">
          <label for="notes" class="form-label fw-semibold">
            <i class="bi bi-chat-left-text me-1 text-secondary"></i>Note
          </label>
          <input type="text" id="notes" name="notes" class="form-control"
                 maxlength="120"
                 value="{{ request.form.get('notes', saving.notes) }}"
                 placeholder="Optional note">
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-check-lg me-1"></i>Update Saving
          </button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <div class="text-muted small mt-3 text-end">
    Created: {{ saving.created_at[:10] }}
  </div>
</div>
{% endblock %}
